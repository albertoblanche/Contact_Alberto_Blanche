:root {
  --black: #0a0a0a;
  --surface: #111111;
  --border: #1e1e1e;
  --gold: #c9a84c;
  --gold-light: #e2c97e;
  --white: #f5f0e8;
  --muted: #555;
}

html, body {
  min-height: 100%;
  background: var(--black);
  color: var(--white);
  font-family: 'DM Mono', monospace;
  display: flex;
  align-items: center;
  justify-content: center;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
  margin: 32px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  opacity: 0;
  transform: translateY(20px);
  animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
}

.card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}

@keyframes fadeUp {
  to { opacity: 1; transform: translateY(0); }
}

/* ── Photo section ── */
.photo-wrap {
  position: relative;
  width: 100%;
  height: 320px;
  overflow: hidden;
}

.photo-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 15%;
  display: block;
  filter: grayscale(20%) contrast(1.05);
}

.photo-wrap::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 120px;
  background: linear-gradient(to bottom, transparent, var(--surface));
}

/* ── Info section ── */
.info {
  padding: 28px 36px 36px;
}

.eyebrow {
  font-size: 9px;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 10px;
  opacity: 0;
  animation: fadeUp 0.7s ease 0.5s forwards;
}

.name {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 300;
  font-size: 46px;
  line-height: 1.0;
  color: var(--white);
  margin-bottom: 6px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.6s forwards;
}

.title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 16px;
  color: var(--muted);
  margin-bottom: 32px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.7s forwards;
}

.divider {
  width: 36px;
  height: 1px;
  background: linear-gradient(90deg, var(--gold), transparent);
  margin-bottom: 28px;
  opacity: 0;
  animation: fadeUp 0.6s ease 0.8s forwards;
}

.contacts {
  display: flex;
  flex-direction: column;
  gap: 10px;
  opacity: 0;
  animation: fadeUp 0.8s ease 0.9s forwards;
}

.contact-btn {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 18px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--white);
  text-decoration: none;
  transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  overflow: hidden;
}

.contact-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--gold);
  opacity: 0;
  transition: opacity 0.3s ease;
}

.contact-btn:hover {
  border-color: var(--gold);
  transform: translateX(4px);
}

.contact-btn:hover::after { opacity: 0.05; }
.contact-btn:active { transform: translateX(2px) scale(0.99); }

.btn-icon {
  width: 16px;
  height: 16px;
  flex-shrink: 0;
  color: var(--gold);
  position: relative;
  z-index: 1;
}

.btn-content {
  display: flex;
  flex-direction: column;
  position: relative;
  z-index: 1;
}

.btn-label {
  font-size: 8px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 2px;
}

.btn-value {
  font-size: 12px;
  color: var(--white);
}

.btn-arrow {
  margin-left: auto;
  color: var(--muted);
  font-size: 14px;
  position: relative;
  z-index: 1;
  transition: transform 0.3s ease, color 0.3s ease;
}

.contact-btn:hover .btn-arrow {
  transform: translateX(3px);
  color: var(--gold);
}
